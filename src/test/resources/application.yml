spring:
  datasource:
    url: "jdbc:sqlite:file:memdb1?mode=memory&cache=shared"
    driver-class-name: org.sqlite.JDBC

    hikari:
      maximum-pool-size: 1
      minimum-idle: 1

  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql

webhook:
  secret: test-secret
  hmac:
    enabled: false